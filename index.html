<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود | Mobile Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:tahoma;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(
    135deg,
    #0f172a,
    #020617
    );
}

.container{
    width:400px;
    padding:40px;
    border-radius:25px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:
    0 0 40px rgba(0,150,255,.3);
}

.logo{
    text-align:center;
    color:white;
    font-size:35px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:15px;
}

.input-group input{

    width:100%;
    padding:15px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,.08);

    color:white;

    font-size:15px;
}

.input-group input::placeholder{
    color:#94a3b8;
}

.login-btn{

    width:100%;
    padding:15px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:.3s;
}

.login-btn:hover{

    background:#3b82f6;

    transform:translateY(-2px);
}

.links{

    text-align:center;

    margin-top:20px;
}

.links a{

    color:#60a5fa;

    text-decoration:none;

    display:block;

    margin-top:10px;
}

.links a:hover{
    color:white;
}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        📱 Mobile Store
    </div>

    <div class="subtitle">
        ورود به حساب کاربری
    </div>

    <form>

        <div class="input-group">
            <input
            type="text"
            placeholder="نام کاربری">
        </div>

        <div class="input-group">
            <input
            type="password"
            placeholder="رمز عبور">
        </div>

        <button
        class="login-btn"
        type="submit">

        ورود

        </button>

    </form>

    <div class="links">

        <a href="#">
            ثبت نام
        </a>

        <a href="#">
            فراموشی رمز عبور
        </a>

    </div>

</div>

</body>
</html>
