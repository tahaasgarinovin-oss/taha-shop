<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود به فروشگاه</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:tahoma;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.container{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:rgba(0, 0, 0, 0.527);
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.links{
    margin-top:20px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#2563eb;
    display:block;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

    <h1>ورود کاربران</h1>

    <form>

        <input type="text" placeholder="نام کاربری">

        <input type="password" placeholder="رمز عبور">

        <button type="submit">ورود</button>

    </form>

    <div class="links">
        <a href="#">ثبت نام</a>
        <a href="#">فراموشی رمز عبور</a>
    </div>

</div>

</body>

</html>
